<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="robots" content="index, follow">
    <meta name="language" content="ru">
    <meta http-equiv="content-language" content="ru">

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/page-loader.js"></script>

    <!-- PWA-баннер нужен на всех страницах -->
    <link rel="stylesheet" href="/static/css/pwa-banner.css?v=1.6.0">

    <title>{% block meta_title %}BilimCalc — калькулятор СО, СОР и СОЧ онлайн{% endblock %}</title>
    <meta name="description" content="{% block meta_desc %}Онлайн калькулятор СО, СОР и СОЧ для школ Казахстана. Быстрый расчёт итоговой оценки за четверть. Бесплатно и без регистрации.{% endblock %}">
    <link rel="canonical" href="{% block canonical %}https://bilimcalc.vercel.app/{% endblock %}">

    <meta property="og:type"        content="{% block og_type %}website{% endblock %}">
    <meta property="og:locale"      content="ru_RU">
    <meta property="og:site_name"   content="BilimCalc">
    <meta property="og:title"       content="{% block og_title %}BilimCalc — калькулятор СО, СОР и СОЧ{% endblock %}">
    <meta property="og:description" content="{% block og_desc %}Быстрый расчет СО, СОР и СОЧ. Бесплатно и без регистрации.{% endblock %}">
    <meta property="og:url"         content="{% block og_url %}https://bilimcalc.vercel.app/{% endblock %}">
    <meta property="og:image"       content="https://bilimcalc.vercel.app/static/icons/preview.png">
    <meta property="og:image:width"  content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card"  content="summary_large_image">
    <meta name="twitter:image" content="https://bilimcalc.vercel.app/static/icons/preview.png">

    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0f1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="/static/css/style.css?v=1.6.0">
    <link rel="stylesheet" href="/static/css/article.css?v=1.6.0">
    <link rel="stylesheet" href="/static/css/page-loader.css?v=1.6.0">
    {% block extra_css %}{% endblock %}

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "BilimCalc",
        "url": "https://bilimcalc.vercel.app/",
        "logo": "https://bilimcalc.vercel.app/static/icons/favicon-32x32.png"
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "BilimCalc",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "url": "https://bilimcalc.vercel.app/",
        "description": "Онлайн-калькулятор для расчёта итоговой оценки по системе СО, СОР и СОЧ в школах Казахстана",
        "inLanguage": "ru",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "KZT" },
        "aggregateRating": { "@type": "AggregateRating", "ratingValue": "4.9", "reviewCount": "128" }
    }
    </script>
    {% block schema_extra %}{% endblock %}

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7S9C0KT928"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-7S9C0KT928');
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
</head>
<body>

<div id="topbar">
    <a class="topbar-logo" href="/" title="BilimCalc">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
            <rect x="2" y="2" width="9" height="9" rx="2" fill="#3cb648"/>
            <rect x="13" y="2" width="9" height="9" rx="2" fill="#3cb648"/>
            <rect x="2" y="13" width="9" height="9" rx="2" fill="#3cb648"/>
            <path d="M15 18h4M17 16v4" stroke="#3cb648" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="topbar-logo__name">Bilim<span>Calc</span></span>
    </a>

    <div class="topbar-center">
        <a href="https://help.bilimland.kz/l_RUS/knowledge_base/item/354267"
           target="_blank" rel="noopener noreferrer" class="topbar-official-link">
            <span>Официальная методика</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
        </a>

        <nav class="topbar-nav" aria-label="Основная навигация">
            <a href="/kak-rasschitat-so"            class="topbar-nav__link {% block nav_so %}{% endblock %}">СО</a>
            <a href="/kak-rasschitat-sor"           class="topbar-nav__link {% block nav_sor %}{% endblock %}">СОР</a>
            <a href="/kak-rasschitat-soch"          class="topbar-nav__link {% block nav_soch %}{% endblock %}">СОЧ</a>
            <a href="/itogovaya-ocenka-za-chetvert" class="topbar-nav__link {% block nav_itog %}{% endblock %}">Итог</a>
            <a href="/metodika-rascheta-mon-rk"     class="topbar-nav__link {% block nav_mon %}{% endblock %}">МОН РК</a>
        </nav>
    </div>

    <button id="themeBtn" class="theme-btn" onclick="ThemeToggle.toggle()" title="Переключить тему">
        <span id="themeIcon">☀️</span>
    </button>
</div>

{% block content %}{% endblock %}

<nav id="mobile-nav" aria-label="Мобильная навигация">
    <a href="/" class="mobile-nav__item {% block mob_home %}{% endblock %}">
        <span class="mobile-nav__icon">🧮</span>
        <span>Калькулятор</span>
    </a>
    <a href="/kak-rasschitat-so" class="mobile-nav__item {% block mob_so %}{% endblock %}">
        <span class="mobile-nav__icon">📊</span>
        <span>СО</span>
    </a>
    <a href="/kak-rasschitat-sor" class="mobile-nav__item {% block mob_sor %}{% endblock %}">
        <span class="mobile-nav__icon">📝</span>
        <span>СОР</span>
    </a>
    <a href="/kak-rasschitat-soch" class="mobile-nav__item {% block mob_soch %}{% endblock %}">
        <span class="mobile-nav__icon">📚</span>
        <span>СОЧ</span>
    </a>
    <a href="/itogovaya-ocenka-za-chetvert" class="mobile-nav__item {% block mob_itog %}{% endblock %}">
        <span class="mobile-nav__icon">🏆</span>
        <span>Итоговая</span>
    </a>
    <a href="/metodika-rascheta-mon-rk" class="mobile-nav__item {% block mob_metodika %}{% endblock %}">
        <span class="mobile-nav__icon">📋</span>
        <span>МОН РК</span>
    </a>
</nav>

<script>
(function(){
    document.addEventListener('click', function(e){
        const target = e.target.closest('.mobile-nav__item, .btn, .topbar-official-link');
        if(!target) return;
        const rect = target.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top  = (e.clientY - rect.top)  + 'px';
        target.style.position = target.style.position || 'relative';
        target.style.overflow = 'hidden';
        target.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
    });
})();
</script>
<script src="/static/js/pwa-install.js?v=1.6.0"></script>
</body>
</html>
